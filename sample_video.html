<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample AI Generated Cinematic Video</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation-duration: 6s;
    animation-fill-mode: forwards;
  }
  
  /* Ken Burns Effect */
  @keyframes kenburns-1 {
    0% { opacity: 0; transform: scale(1); }
    10% { opacity: 1; transform: scale(1.02); }
    90% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(1.12); }
  }

  @keyframes kenburns-2 {
    0% { opacity: 0; transform: scale(1.1) translate(0,0); }
    5% { opacity: 1; transform: scale(1.1) translate(-10px, 10px); }
    95% { opacity: 1; transform: scale(1.05) translate(10px, -10px); }
    100% { opacity: 0; transform: scale(1.02) translate(15px, -15px); }
  }

  @keyframes kenburns-3 {
    0% { opacity: 0; transform: scale(1); }
    10% { opacity: 1; transform: scale(1.02); }
    90% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1.15); } /* don't fade out the last one */
  }

  .scene1 {
    background-image: url('file:///C:/Users/kanna/.gemini/antigravity/brain/59179593-336f-4497-91cc-d985d6ef00e5/sequence_1_hero_enters_1775118116269.png');
    animation-name: kenburns-1;
    animation-delay: 0s;
  }

  .scene2 {
    background-image: url('file:///C:/Users/kanna/.gemini/antigravity/brain/59179593-336f-4497-91cc-d985d6ef00e5/sequence_2_fight_1775118135198.png');
    animation-name: kenburns-2;
    animation-delay: 5s;
  }

  .scene3 {
    background-image: url('file:///C:/Users/kanna/.gemini/antigravity/brain/59179593-336f-4497-91cc-d985d6ef00e5/sequence_3_finish_1775118154017.png');
    animation-name: kenburns-3;
    animation-delay: 10s;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 10;
  }
  
  .cinematic-bars {
    position: absolute;
    width: 100%;
    height: 10%;
    background: black;
    z-index: 20;
  }
  .bar-top { top: 0; }
  .bar-bottom { bottom: 0; }
</style>
</head>
<body>
  <div class="scene scene1"></div>
  <div class="scene scene2"></div>
  <div class="scene scene3"></div>
  <div class="overlay"></div>
  <div class="cinematic-bars bar-top"></div>
  <div class="cinematic-bars bar-bottom"></div>
</body>
</html>
